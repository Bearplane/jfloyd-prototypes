<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760" role="img" aria-label="Q-ScanAI scan lifecycle: 7 stages">
  <title>Q-ScanAI — Scan Lifecycle (7 stages)</title>
  <desc>Trigger → Snapshot → Pre-flight → Discovery → Execution loop → Aggregation → Finalize. Shows what each stage does and which entities it writes.</desc>

  <defs>
    <style>
      .heading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; fill: #141413; }
      .subheading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 500; fill: #141413; }
      .body { font-family: "Inter", "Lora", "Georgia", sans-serif; fill: #141413; }
      .light { fill: #faf9f5; }
      .mute { fill: #5a5a5a; font-family: "Inter", sans-serif; }
      .layer-label { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; letter-spacing: 0.06em; fill: #b0aea5; text-transform: uppercase; }
      .num { font-family: "Poppins", sans-serif; font-weight: 700; fill: #faf9f5; }
    </style>
    <marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5a5a5a"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf9f5"/>
      <stop offset="1" stop-color="#f3f1e8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1400" height="760" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="50" class="heading" font-size="28">Q-ScanAI — Scan Run Lifecycle</text>
  <text x="40" y="76" class="body" font-size="14" fill="#5a5a5a">7 stages from `POST /scans` to `COMPLETED`. Each stage names the entities it writes.</text>
  <text x="1360" y="50" class="body" font-size="12" fill="#5a5a5a" text-anchor="end">Source: 04-execution-flow.md §2–§13 · 01-design-overview.md §5</text>

  <!-- Status track at top -->
  <g transform="translate(40,110)">
    <text x="0" y="-4" class="layer-label" font-size="10">qsa_scan_run.status flips</text>
    <rect x="0" y="6" width="1320" height="22" rx="4" fill="#e8e6dc" stroke="#b0aea5"/>
    <line x1="170" y1="6" x2="170" y2="28" stroke="#b0aea5"/>
    <line x1="380" y1="6" x2="380" y2="28" stroke="#b0aea5"/>
    <line x1="600" y1="6" x2="600" y2="28" stroke="#b0aea5"/>
    <line x1="900" y1="6" x2="900" y2="28" stroke="#b0aea5"/>
    <line x1="1120" y1="6" x2="1120" y2="28" stroke="#b0aea5"/>
    <text x="80" y="22" class="mute" font-size="10.5" text-anchor="middle">PENDING</text>
    <text x="275" y="22" class="mute" font-size="10.5" text-anchor="middle">PENDING</text>
    <text x="490" y="22" class="mute" font-size="10.5" text-anchor="middle">PENDING</text>
    <text x="750" y="22" class="mute" font-size="10.5" text-anchor="middle">DISCOVERING → EXECUTING</text>
    <text x="1010" y="22" class="mute" font-size="10.5" text-anchor="middle">EXECUTING</text>
    <text x="1220" y="22" class="mute" font-size="10.5" text-anchor="middle">COMPLETING → COMPLETED</text>
  </g>

  <!-- Stage cards (7 of them, evenly spaced).  Width = 178, gap = 8, total content = 1320. -->
  <!-- helper: stage box -->
  <g>
    <!-- Stage 1: Trigger -->
    <g transform="translate(40,180)">
      <rect x="0" y="0" width="178" height="180" rx="10" fill="#1f3a5f" stroke="#1f3a5f"/>
      <circle cx="22" cy="22" r="14" fill="#d97757"/>
      <text x="22" y="27" class="num" font-size="14" text-anchor="middle">1</text>
      <text x="42" y="27" class="subheading light" font-size="14">Trigger</text>
      <line x1="12" y1="44" x2="166" y2="44" stroke="#faf9f5" opacity="0.3"/>
      <text x="12" y="64" class="body light" font-size="11.5">Schedule · analyst dashboard ·</text>
      <text x="12" y="80" class="body light" font-size="11.5">processor API · webhook</text>
      <text x="12" y="106" class="body light" font-size="10.5" opacity="0.85">POST /scans</text>
      <text x="12" y="121" class="body light" font-size="10.5" opacity="0.85">{ merchantId, inputSpec,</text>
      <text x="12" y="135" class="body light" font-size="10.5" opacity="0.85">  priority, mode }</text>
      <text x="12" y="166" class="body light" font-size="10" opacity="0.7" font-style="italic">Audit: scan.created</text>
    </g>

    <!-- Stage 2: Snapshot -->
    <g transform="translate(226,180)">
      <rect x="0" y="0" width="178" height="180" rx="10" fill="#2c5282" stroke="#2c5282"/>
      <circle cx="22" cy="22" r="14" fill="#d97757"/>
      <text x="22" y="27" class="num" font-size="14" text-anchor="middle">2</text>
      <text x="42" y="27" class="subheading light" font-size="14">Snapshot</text>
      <line x1="12" y1="44" x2="166" y2="44" stroke="#faf9f5" opacity="0.3"/>
      <text x="12" y="64" class="body light" font-size="11.5">Resolve effective profile</text>
      <text x="12" y="80" class="body light" font-size="11.5">(processor → merchant +</text>
      <text x="12" y="94" class="body light" font-size="11.5">overrides + exclusions).</text>
      <text x="12" y="116" class="body light" font-size="11.5">Pin active version IDs of</text>
      <text x="12" y="130" class="body light" font-size="11.5">every policy / rule / action.</text>
      <text x="12" y="148" class="body light" font-size="10" opacity="0.85" font-style="italic">writes:</text>
      <text x="12" y="161" class="body light" font-size="10" opacity="0.85" font-style="italic">qsa_scan_run_pinned_version</text>
    </g>

    <!-- Stage 3: Pre-flight -->
    <g transform="translate(412,180)">
      <rect x="0" y="0" width="178" height="180" rx="10" fill="#2c5282" stroke="#2c5282"/>
      <circle cx="22" cy="22" r="14" fill="#d97757"/>
      <text x="22" y="27" class="num" font-size="14" text-anchor="middle">3</text>
      <text x="42" y="27" class="subheading light" font-size="14">Pre-flight</text>
      <line x1="12" y1="44" x2="166" y2="44" stroke="#faf9f5" opacity="0.3"/>
      <text x="12" y="64" class="body light" font-size="11">Cycle detection on DAG</text>
      <text x="12" y="80" class="body light" font-size="11">Schema validate parameters</text>
      <text x="12" y="96" class="body light" font-size="11">Verify credential refs</text>
      <text x="12" y="112" class="body light" font-size="11">SSL probe (sync, if pinned)</text>
      <text x="12" y="138" class="body light" font-size="10" opacity="0.85" font-style="italic">Failure here = FAILED</text>
      <text x="12" y="152" class="body light" font-size="10" opacity="0.85" font-style="italic">(no results recorded yet)</text>
      <text x="12" y="170" class="body light" font-size="9.5" opacity="0.7">Then enqueue BullMQ job</text>
    </g>

    <!-- Stage 4: Discovery -->
    <g transform="translate(598,180)">
      <rect x="0" y="0" width="178" height="180" rx="10" fill="#3d6b9c" stroke="#3d6b9c"/>
      <circle cx="22" cy="22" r="14" fill="#d97757"/>
      <text x="22" y="27" class="num" font-size="14" text-anchor="middle">4</text>
      <text x="42" y="27" class="subheading light" font-size="14">Discovery</text>
      <line x1="12" y1="44" x2="166" y2="44" stroke="#faf9f5" opacity="0.3"/>
      <text x="12" y="64" class="body light" font-size="11">One pluggable handler:</text>
      <text x="12" y="80" class="body light" font-size="11">WEBSITE_CRAWLER · COA_DOC</text>
      <text x="12" y="94" class="body light" font-size="11">S3_FOLDER · CANNASPY · …</text>
      <text x="12" y="116" class="body light" font-size="11">Streams items lazily.</text>
      <text x="12" y="130" class="body light" font-size="11">URL canonicalize · dedup.</text>
      <text x="12" y="148" class="body light" font-size="10" opacity="0.85" font-style="italic">writes:</text>
      <text x="12" y="161" class="body light" font-size="10" opacity="0.85" font-style="italic">qsa_scan_run_item +</text>
      <text x="12" y="173" class="body light" font-size="10" opacity="0.85" font-style="italic">  qsa_scan_run_item_content</text>
    </g>

    <!-- Stage 5: Execution -->
    <g transform="translate(784,180)">
      <rect x="0" y="0" width="178" height="180" rx="10" fill="#3d6b9c" stroke="#3d6b9c"/>
      <circle cx="22" cy="22" r="14" fill="#d97757"/>
      <text x="22" y="27" class="num" font-size="14" text-anchor="middle">5</text>
      <text x="42" y="27" class="subheading light" font-size="14">Execution</text>
      <line x1="12" y1="44" x2="166" y2="44" stroke="#faf9f5" opacity="0.3"/>
      <text x="12" y="64" class="body light" font-size="11">Per item, per tier:</text>
      <text x="12" y="80" class="body light" font-size="11">8-step policy loop</text>
      <text x="12" y="94" class="body light" font-size="10.5" opacity="0.9">deps → input → fingerprint →</text>
      <text x="12" y="106" class="body light" font-size="10.5" opacity="0.9">DOM filter → MAIN action →</text>
      <text x="12" y="118" class="body light" font-size="10.5" opacity="0.9">rule → action tree → persist</text>
      <text x="12" y="138" class="body light" font-size="11">Checkpoint each tier.</text>
      <text x="12" y="158" class="body light" font-size="10" opacity="0.85" font-style="italic">writes: qsa_policy_execution_</text>
      <text x="12" y="170" class="body light" font-size="10" opacity="0.85" font-style="italic">  result, action_invocation</text>
    </g>

    <!-- Stage 6: Aggregation -->
    <g transform="translate(970,180)">
      <rect x="0" y="0" width="178" height="180" rx="10" fill="#788c5d" stroke="#788c5d"/>
      <circle cx="22" cy="22" r="14" fill="#d97757"/>
      <text x="22" y="27" class="num" font-size="14" text-anchor="middle">6</text>
      <text x="42" y="27" class="subheading light" font-size="14">Aggregate</text>
      <line x1="12" y1="44" x2="166" y2="44" stroke="#faf9f5" opacity="0.3"/>
      <text x="12" y="64" class="body light" font-size="11">PARENT policies roll up</text>
      <text x="12" y="80" class="body light" font-size="11">child results across items.</text>
      <text x="12" y="106" class="body light" font-size="11">Aggregation rules:</text>
      <text x="12" y="120" class="body light" font-size="10.5" opacity="0.9">ALL_MUST_PASS · ANY ·</text>
      <text x="12" y="132" class="body light" font-size="10.5" opacity="0.9">THRESHOLD · WEIGHTED</text>
      <text x="12" y="158" class="body light" font-size="10" opacity="0.85" font-style="italic">writes: parent rows in</text>
      <text x="12" y="170" class="body light" font-size="10" opacity="0.85" font-style="italic">  qsa_policy_execution_result</text>
    </g>

    <!-- Stage 7: Finalize -->
    <g transform="translate(1156,180)">
      <rect x="0" y="0" width="178" height="180" rx="10" fill="#a89070" stroke="#a89070"/>
      <circle cx="22" cy="22" r="14" fill="#d97757"/>
      <text x="22" y="27" class="num" font-size="14" text-anchor="middle">7</text>
      <text x="42" y="27" class="subheading light" font-size="14">Finalize</text>
      <line x1="12" y1="44" x2="166" y2="44" stroke="#faf9f5" opacity="0.3"/>
      <text x="12" y="64" class="body light" font-size="11">Compute finding deltas vs</text>
      <text x="12" y="78" class="body light" font-size="11">previous run.</text>
      <text x="12" y="98" class="body light" font-size="11">Carry NEW · ONGOING ·</text>
      <text x="12" y="112" class="body light" font-size="11">RESOLVED · CLEARED.</text>
      <text x="12" y="132" class="body light" font-size="11">Publish QMonitor status.</text>
      <text x="12" y="158" class="body light" font-size="10" opacity="0.85" font-style="italic">writes: qsa_compliance_finding,</text>
      <text x="12" y="170" class="body light" font-size="10" opacity="0.85" font-style="italic">  qsa_scan_run_summary</text>
    </g>
  </g>

  <!-- arrows between stages -->
  <g stroke="#5a5a5a" stroke-width="1.6" fill="none">
    <line x1="218" y1="270" x2="226" y2="270" marker-end="url(#arr)"/>
    <line x1="404" y1="270" x2="412" y2="270" marker-end="url(#arr)"/>
    <line x1="590" y1="270" x2="598" y2="270" marker-end="url(#arr)"/>
    <line x1="776" y1="270" x2="784" y2="270" marker-end="url(#arr)"/>
    <line x1="962" y1="270" x2="970" y2="270" marker-end="url(#arr)"/>
    <line x1="1148" y1="270" x2="1156" y2="270" marker-end="url(#arr)"/>
  </g>

  <!-- The 8-step policy loop, expanded -->
  <text x="40" y="416" class="layer-label" font-size="11">Inside Stage 5 — the 8-step policy execution loop (per item, per policy)</text>
  <g transform="translate(40,432)">
    <rect x="0" y="0" width="1320" height="178" rx="10" fill="#ffffff" stroke="#3d6b9c" stroke-width="1.5"/>
    <!-- 8 step pills, evenly spaced -->
    <g font-family="Inter, sans-serif">
      <!-- step 1 -->
      <rect x="20" y="40" width="148" height="58" rx="6" fill="#e8e6dc" stroke="#3d6b9c" stroke-width="1"/>
      <text x="94" y="58" class="subheading" font-size="11" text-anchor="middle">1 · Resolve deps</text>
      <text x="94" y="74" class="body" font-size="10" text-anchor="middle" fill="#3a3a3a">HARD/SOFT/WARN</text>
      <text x="94" y="88" class="mute" font-size="9" text-anchor="middle">→ SKIP if blocked</text>
      <!-- step 2 -->
      <rect x="178" y="40" width="148" height="58" rx="6" fill="#e8e6dc" stroke="#3d6b9c" stroke-width="1"/>
      <text x="252" y="58" class="subheading" font-size="11" text-anchor="middle">2 · Resolve input</text>
      <text x="252" y="74" class="body" font-size="10" text-anchor="middle" fill="#3a3a3a">DOM · file · API</text>
      <text x="252" y="88" class="mute" font-size="9" text-anchor="middle">validate vs schema</text>
      <!-- step 3 -->
      <rect x="336" y="40" width="148" height="58" rx="6" fill="#e8e6dc" stroke="#3d6b9c" stroke-width="1"/>
      <text x="410" y="58" class="subheading" font-size="11" text-anchor="middle">3 · Fingerprint</text>
      <text x="410" y="74" class="body" font-size="10" text-anchor="middle" fill="#3a3a3a">SHA-256 vs prior</text>
      <text x="410" y="88" class="mute" font-size="9" text-anchor="middle">→ CACHED skip-ahead</text>
      <!-- step 4 -->
      <rect x="494" y="40" width="148" height="58" rx="6" fill="#e8e6dc" stroke="#3d6b9c" stroke-width="1"/>
      <text x="568" y="58" class="subheading" font-size="11" text-anchor="middle">4 · DOM pre-filter</text>
      <text x="568" y="74" class="body" font-size="10" text-anchor="middle" fill="#3a3a3a">required + supportive</text>
      <text x="568" y="88" class="mute" font-size="9" text-anchor="middle">trims AI tokens</text>
      <!-- step 5 -->
      <rect x="652" y="40" width="148" height="58" rx="6" fill="#1f3a5f" stroke="#1f3a5f"/>
      <text x="726" y="58" class="subheading light" font-size="11" text-anchor="middle">5 · MAIN action(s)</text>
      <text x="726" y="74" class="body light" font-size="10" text-anchor="middle" opacity="0.92">unified AI prompt</text>
      <text x="726" y="88" class="body light" font-size="9" text-anchor="middle" opacity="0.75">token-batched per page</text>
      <!-- step 6 -->
      <rect x="810" y="40" width="148" height="58" rx="6" fill="#e8e6dc" stroke="#3d6b9c" stroke-width="1"/>
      <text x="884" y="58" class="subheading" font-size="11" text-anchor="middle">6 · Rule eval</text>
      <text x="884" y="74" class="body" font-size="10" text-anchor="middle" fill="#3a3a3a">json-rules-engine</text>
      <text x="884" y="88" class="mute" font-size="9" text-anchor="middle">PASS / FAIL / N_A</text>
      <!-- step 7 -->
      <rect x="968" y="40" width="148" height="58" rx="6" fill="#e8e6dc" stroke="#3d6b9c" stroke-width="1"/>
      <text x="1042" y="58" class="subheading" font-size="11" text-anchor="middle">7 · Action tree</text>
      <text x="1042" y="74" class="body" font-size="10" text-anchor="middle" fill="#3a3a3a">PRE/POST/ON_FAIL</text>
      <text x="1042" y="88" class="mute" font-size="9" text-anchor="middle">tickets · email · webhook</text>
      <!-- step 8 -->
      <rect x="1126" y="40" width="174" height="58" rx="6" fill="#788c5d" stroke="#788c5d"/>
      <text x="1213" y="58" class="subheading light" font-size="11" text-anchor="middle">8 · Persist + checkpoint</text>
      <text x="1213" y="74" class="body light" font-size="10" text-anchor="middle" opacity="0.92">execution_result row</text>
      <text x="1213" y="88" class="body light" font-size="9" text-anchor="middle" opacity="0.75">finding upsert (CHECK)</text>

      <!-- arrows -->
      <line x1="168" y1="69" x2="178" y2="69" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/>
      <line x1="326" y1="69" x2="336" y2="69" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/>
      <line x1="484" y1="69" x2="494" y2="69" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/>
      <line x1="642" y1="69" x2="652" y2="69" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/>
      <line x1="800" y1="69" x2="810" y2="69" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/>
      <line x1="958" y1="69" x2="968" y2="69" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/>
      <line x1="1116" y1="69" x2="1126" y2="69" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/>

      <!-- caption -->
      <text x="660" y="22" class="subheading" font-size="13" text-anchor="middle">8-step policy loop  ·  per (item, policy) pair</text>
      <text x="660" y="138" class="body" font-size="11" text-anchor="middle" fill="#3a3a3a">Cache hit at step 3 short-circuits to step 8. Operational policies (policy_kind=OPERATIONAL) skip the finding upsert; their action invocations are the durable record.</text>
      <text x="660" y="158" class="mute" font-size="10.5" text-anchor="middle">Every step emits typed audit events. traceId = scan_run_id throughout.</text>
    </g>
  </g>

  <!-- Resilience strip -->
  <text x="40" y="650" class="layer-label" font-size="11">Resilience &amp; partial-result handling</text>
  <g transform="translate(40,664)">
    <rect x="0" y="0" width="640" height="80" rx="8" fill="#ffffff" stroke="#a89070" stroke-width="1.5"/>
    <text x="20" y="24" class="subheading" font-size="13">Crash + resume</text>
    <text x="20" y="46" class="body" font-size="11" fill="#3a3a3a">Worker crash → next worker reads qsa_scan_run_checkpoint:</text>
    <text x="20" y="62" class="body" font-size="11" fill="#3a3a3a">restores context store (gzipped blob), resumes discovery cursor,</text>
    <text x="20" y="74" class="body" font-size="11" fill="#3a3a3a">skips already-completed (policy, item) pairs. Result is deterministic.</text>

    <rect x="680" y="0" width="640" height="80" rx="8" fill="#ffffff" stroke="#a89070" stroke-width="1.5"/>
    <text x="700" y="24" class="subheading" font-size="13">Cancellation + partial</text>
    <text x="700" y="46" class="body" font-size="11" fill="#3a3a3a">POST /scans/:id/cancel publishes Redis cancel signal.</text>
    <text x="700" y="62" class="body" font-size="11" fill="#3a3a3a">Worker checks at every checkpoint boundary → CANCELLED.</text>
    <text x="700" y="74" class="body" font-size="11" fill="#3a3a3a">Unrecoverable error mid-run → status = PARTIAL with partial=true.</text>
  </g>
</svg>
