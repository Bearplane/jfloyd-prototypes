<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760" role="img" aria-label="Compliance finding state machine: NEW → ONGOING → RESOLVED → ANALYST_CLEARED, with reopen logic and immutable first_detected_at">
  <title>Q-ScanAI — Compliance Finding Lifecycle</title>
  <desc>Persistent finding memory state machine with immutable first_detected_at across all transitions.</desc>

  <defs>
    <style>
      .heading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; fill: #141413; }
      .subheading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 500; fill: #141413; }
      .body { font-family: "Inter", "Lora", "Georgia", sans-serif; fill: #141413; }
      .light { fill: #faf9f5; }
      .mute { fill: #5a5a5a; font-family: "Inter", sans-serif; }
      .layer-label { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; letter-spacing: 0.06em; fill: #b0aea5; text-transform: uppercase; }
      .pill { font-family: "Inter", "Poppins", "Arial", sans-serif; font-weight: 600; letter-spacing: 0.04em; fill: #faf9f5; }
    </style>
    <marker id="arrf" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arrf-warn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#d97757"/>
    </marker>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf9f5"/>
      <stop offset="1" stop-color="#f3f1e8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="40" y="50" class="heading" font-size="28">Compliance Finding Lifecycle</text>
  <text x="40" y="76" class="body" font-size="14" fill="#5a5a5a">Persistent memory keyed by (merchant_id, finding_hash). The date a finding was first seen is immutable across every transition.</text>
  <text x="1240" y="50" class="body" font-size="12" fill="#5a5a5a" text-anchor="end">Source: 05-lifecycle-and-state-transitions.md §9 + 03-data-model.md §14</text>

  <!-- IMMUTABILITY BANNER (the SOC 2 / regulatory invariant) -->
  <g transform="translate(40,108)">
    <rect x="0" y="0" width="1200" height="56" rx="10" fill="#1f3a5f" stroke="#1f3a5f"/>
    <text x="20" y="24" class="subheading light" font-size="13">Invariant — `first_detected_at` is set once on `NEW` and never overwritten.</text>
    <text x="20" y="44" class="body light" font-size="11.5" opacity="0.9">No matter how many times the finding cycles ONGOING ↔ RESOLVED ↔ reopened, the original first-detection timestamp survives. This is the SOC 2 / regulatory guarantee an auditor can verify by querying a single column.</text>
    <text x="1180" y="32" class="body light" font-size="13" text-anchor="end" font-weight="700" opacity="0.85">⚲</text>
  </g>

  <!-- The four states -->
  <g>
    <!-- NEW -->
    <g transform="translate(110,220)">
      <rect x="0" y="0" width="220" height="100" rx="14" fill="#d97757" stroke="#d97757"/>
      <text x="110" y="40" class="heading light" font-size="22" text-anchor="middle">NEW</text>
      <text x="110" y="64" class="body light" font-size="11" text-anchor="middle" opacity="0.9">first FAIL ever for this</text>
      <text x="110" y="78" class="body light" font-size="11" text-anchor="middle" opacity="0.9">(merchant, finding_hash)</text>
      <text x="110" y="92" class="body light" font-size="10.5" text-anchor="middle" opacity="0.85" font-style="italic">first_detected_at = now()</text>
    </g>

    <!-- ONGOING -->
    <g transform="translate(560,220)">
      <rect x="0" y="0" width="220" height="100" rx="14" fill="#a89070" stroke="#a89070"/>
      <text x="110" y="40" class="heading light" font-size="22" text-anchor="middle">ONGOING</text>
      <text x="110" y="64" class="body light" font-size="11" text-anchor="middle" opacity="0.9">still failing this scan</text>
      <text x="110" y="78" class="body light" font-size="11" text-anchor="middle" opacity="0.9">recurrence count++</text>
      <text x="110" y="92" class="body light" font-size="10.5" text-anchor="middle" opacity="0.85" font-style="italic">last_detected_at = now()</text>
    </g>

    <!-- RESOLVED -->
    <g transform="translate(950,220)">
      <rect x="0" y="0" width="220" height="100" rx="14" fill="#788c5d" stroke="#788c5d"/>
      <text x="110" y="40" class="heading light" font-size="22" text-anchor="middle">RESOLVED</text>
      <text x="110" y="64" class="body light" font-size="11" text-anchor="middle" opacity="0.9">PASSED in this scan</text>
      <text x="110" y="78" class="body light" font-size="11" text-anchor="middle" opacity="0.9">after a prior FAIL</text>
      <text x="110" y="92" class="body light" font-size="10.5" text-anchor="middle" opacity="0.85" font-style="italic">last_resolved_at = now()</text>
    </g>

    <!-- ANALYST_CLEARED (off-axis, bottom) -->
    <g transform="translate(560,490)">
      <rect x="0" y="0" width="220" height="100" rx="14" fill="#2c5282" stroke="#2c5282"/>
      <text x="110" y="40" class="heading light" font-size="20" text-anchor="middle">ANALYST_CLEARED</text>
      <text x="110" y="64" class="body light" font-size="11" text-anchor="middle" opacity="0.9">human reviewed and</text>
      <text x="110" y="78" class="body light" font-size="11" text-anchor="middle" opacity="0.9">explicitly cleared</text>
      <text x="110" y="92" class="body light" font-size="10.5" text-anchor="middle" opacity="0.85" font-style="italic">analyst_cleared_reason set</text>
    </g>
  </g>

  <!-- Transition arrows -->
  <g stroke="#5a5a5a" stroke-width="2" fill="none">
    <!-- NEW → ONGOING (next scan, still failing) -->
    <path d="M 330 270 L 560 270" marker-end="url(#arrf)"/>
    <!-- ONGOING → RESOLVED (passes) -->
    <path d="M 780 270 L 950 270" marker-end="url(#arrf)"/>
    <!-- RESOLVED → ONGOING (reopened by FAIL again) -->
    <path d="M 1060 320 L 1060 360 L 670 360 L 670 320" marker-end="url(#arrf)"/>
    <!-- ONGOING → ANALYST_CLEARED -->
    <path d="M 670 320 L 670 490" marker-end="url(#arrf)" stroke="#2c5282"/>
    <!-- NEW → ANALYST_CLEARED (rare; analyst dismisses immediately) -->
    <path d="M 220 320 L 220 540 L 560 540" marker-end="url(#arrf)" stroke="#2c5282"/>
    <!-- ANALYST_CLEARED → ONGOING (content / policy changes) -->
  </g>
  <path d="M 670 490 L 670 460 L 870 460 L 870 320" stroke="#d97757" stroke-width="2" fill="none" marker-end="url(#arrf-warn)"/>

  <!-- Transition labels -->
  <text x="445" y="262" class="mute" font-size="11.5" text-anchor="middle">re-detected in next scan</text>
  <text x="865" y="262" class="mute" font-size="11.5" text-anchor="middle">PASS observed</text>
  <text x="865" y="380" class="mute" font-size="11" text-anchor="middle" font-style="italic">reopened on FAIL — first_detected_at preserved</text>

  <text x="690" y="412" class="mute" font-size="11" fill="#2c5282">analyst &quot;clear&quot; with reason</text>
  <text x="350" y="555" class="mute" font-size="11" fill="#2c5282">rare: analyst dismisses on first detection</text>

  <text x="900" y="450" class="mute" font-size="11" fill="#d97757" text-anchor="middle">cleared finding REOPENS only when content_hash OR policy_version_id changes</text>

  <!-- Reopen-logic decision panel -->
  <g transform="translate(60,628)">
    <text x="0" y="-12" class="layer-label" font-size="11">Reopen logic — what happens when a cleared finding sees a fresh FAIL</text>
    <rect x="0" y="0" width="1180" height="100" rx="10" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.5"/>

    <g transform="translate(20,18)">
      <rect x="0" y="0" width="280" height="64" rx="8" fill="#e8e6dc" stroke="#788c5d" stroke-width="1.5"/>
      <text x="14" y="22" class="subheading" font-size="12">RESOLVED + FAIL</text>
      <text x="14" y="40" class="body" font-size="10.5" fill="#3a3a3a">→ ONGOING. previous_occurrences++.</text>
      <text x="14" y="54" class="body" font-size="10.5" fill="#3a3a3a">reopened_at = now(). first_detected_at preserved.</text>
    </g>
    <g transform="translate(316,18)">
      <rect x="0" y="0" width="380" height="64" rx="8" fill="#e8e6dc" stroke="#2c5282" stroke-width="1.5"/>
      <text x="14" y="22" class="subheading" font-size="12">ANALYST_CLEARED + FAIL · same content_hash AND same policy_version</text>
      <text x="14" y="40" class="body" font-size="10.5" fill="#3a3a3a">→ stay CLEARED. The analyst's clearance is respected:</text>
      <text x="14" y="54" class="body" font-size="10.5" fill="#3a3a3a">no change to tracking_status, no recurrence increment.</text>
    </g>
    <g transform="translate(712,18)">
      <rect x="0" y="0" width="448" height="64" rx="8" fill="#e8e6dc" stroke="#d97757" stroke-width="1.5"/>
      <text x="14" y="22" class="subheading" font-size="12">ANALYST_CLEARED + FAIL · content_hash OR policy_version changed</text>
      <text x="14" y="40" class="body" font-size="10.5" fill="#3a3a3a">→ ONGOING. The clearance was for the prior fact-set; the new evidence</text>
      <text x="14" y="54" class="body" font-size="10.5" fill="#3a3a3a">reopens the finding. first_detected_at still preserved.</text>
    </g>
  </g>

  <!-- Side legend bar with finding hash composition -->
  <g transform="translate(60,395)">
    <rect x="0" y="0" width="540" height="60" rx="6" fill="#ffffff" stroke="#b0aea5"/>
    <text x="14" y="22" class="subheading" font-size="12">finding_hash composition (ADR-019)</text>
    <text x="14" y="42" class="body" font-size="11" fill="#3a3a3a">SHA-256( policy_id ‖ finding_identity_scope ‖ resource_kind ‖ resource_key )</text>
    <text x="14" y="56" class="mute" font-size="9.5">Granularity ✕ medium ✕ key — same hash → same finding across scans, regardless of scope.</text>
  </g>
</svg>
