<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" width="1280" height="880" role="img" aria-label="Q-ScanAI 15-module system architecture">
  <title>Q-ScanAI — System Architecture (15 modules)</title>
  <desc>Layered architecture: API gateway, configuration, workflow orchestration, execution, data, security, and cross-cutting concerns.</desc>

  <defs>
    <style>
      .heading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; fill: #141413; }
      .subheading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 500; fill: #141413; }
      .body { font-family: "Inter", "Lora", "Georgia", sans-serif; fill: #141413; }
      .light { fill: #faf9f5; }
      .mute { fill: #5a5a5a; font-family: "Inter", sans-serif; }
      .layer-label { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; letter-spacing: 0.06em; fill: #b0aea5; text-transform: uppercase; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5a5a5a"/>
    </marker>
    <linearGradient id="page-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf9f5"/>
      <stop offset="1" stop-color="#f3f1e8"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect x="0" y="0" width="1280" height="880" fill="url(#page-bg)"/>

  <!-- Title -->
  <text x="40" y="50" class="heading" font-size="28">Q-ScanAI — System Architecture</text>
  <text x="40" y="76" class="body" font-size="14" fill="#5a5a5a">15 modules across 5 layers. Rules are configuration; execution is generic; audit is cross-cutting.</text>
  <text x="1240" y="50" class="body" font-size="12" fill="#5a5a5a" text-anchor="end">Source: design-proposal.md §3.1</text>

  <!-- ========== LAYER 1 — API GATEWAY ========== -->
  <text x="40" y="116" class="layer-label" font-size="11">Edge</text>
  <g>
    <rect x="40" y="125" width="1200" height="62" rx="8" fill="#1f3a5f" stroke="#1f3a5f" stroke-width="1"/>
    <text x="640" y="151" class="heading light" font-size="17" text-anchor="middle">15 · API Gateway Layer</text>
    <text x="640" y="172" class="body light" font-size="12" text-anchor="middle" opacity="0.85">REST + JWT · per-merchant API keys · rate limiting · request/response schema validation</text>
  </g>

  <!-- arrows down from API gateway -->
  <line x1="370" y1="187" x2="370" y2="218" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="187" x2="900" y2="218" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== LAYER 2 — CONFIGURATION ========== -->
  <text x="40" y="214" class="layer-label" font-size="11">Configuration · what the engine knows</text>
  <g>
    <!-- Configuration Management -->
    <rect x="80" y="225" width="540" height="86" rx="8" fill="#ffffff" stroke="#1f3a5f" stroke-width="2"/>
    <text x="100" y="252" class="subheading" font-size="15">1 · Configuration Management</text>
    <text x="100" y="273" class="body" font-size="11" fill="#3a3a3a">Versioning · lifecycle (draft → testable → active → deprecated)</text>
    <text x="100" y="290" class="body" font-size="11" fill="#3a3a3a">Four-eyes promotion · diff API · template-to-instance float-to-latest</text>
    <text x="100" y="305" class="body" font-size="10.5" fill="#5a5a5a" font-style="italic">qsa_policy · qsa_rule · qsa_action · qsa_policy_template · qsa_policy_group</text>
    <!-- Policy Assignment -->
    <rect x="660" y="225" width="540" height="86" rx="8" fill="#ffffff" stroke="#1f3a5f" stroke-width="2"/>
    <text x="680" y="252" class="subheading" font-size="15">2 · Policy Assignment</text>
    <text x="680" y="273" class="body" font-size="11" fill="#3a3a3a">Assign · override · exclude · inheritance resolver</text>
    <text x="680" y="290" class="body" font-size="11" fill="#3a3a3a">Bulk-confirm gate · effective-date windows · pending_review state</text>
    <text x="680" y="305" class="body" font-size="10.5" fill="#5a5a5a" font-style="italic">qsa_assignment · processor → merchant inheritance</text>
  </g>

  <!-- arrow from config-management to assignment -->
  <line x1="620" y1="268" x2="660" y2="268" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="640" y="262" class="mute" font-size="9" text-anchor="middle">snapshot</text>

  <!-- arrows down from layer 2 -->
  <line x1="350" y1="311" x2="350" y2="358" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="930" y1="311" x2="930" y2="358" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="640" y="334" class="mute" font-size="10" text-anchor="middle">resolved profiles + pinned versions</text>

  <!-- ========== LAYER 3 — WORKFLOW ORCHESTRATION ========== -->
  <text x="40" y="358" class="layer-label" font-size="11">Orchestration · the runtime brain</text>
  <g>
    <rect x="80" y="368" width="1120" height="74" rx="8" fill="#2c5282" stroke="#2c5282" stroke-width="1"/>
    <text x="640" y="396" class="heading light" font-size="17" text-anchor="middle">3 · Workflow Orchestration Engine</text>
    <text x="640" y="418" class="body light" font-size="12" text-anchor="middle" opacity="0.92">Intake → snapshot → DAG build → topological tier scheduling → cooperative concurrency loop → checkpoint → finalize</text>
    <text x="640" y="434" class="body light" font-size="10.5" text-anchor="middle" opacity="0.75" font-style="italic">BullMQ worker · ECS task protection · scan_run state machine</text>
  </g>

  <!-- arrows down to execution layer -->
  <line x1="200" y1="442" x2="200" y2="475" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="442" x2="490" y2="475" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="442" x2="780" y2="475" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1070" y1="442" x2="1070" y2="475" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== LAYER 4 — EXECUTION MODULES ========== -->
  <text x="40" y="471" class="layer-label" font-size="11">Execution · per-item work</text>
  <g>
    <!-- Discovery -->
    <rect x="80" y="481" width="240" height="106" rx="8" fill="#ffffff" stroke="#3d6b9c" stroke-width="2"/>
    <text x="100" y="506" class="subheading" font-size="14">9 · Page / File / Resource Discovery</text>
    <text x="100" y="525" class="body" font-size="10.5" fill="#3a3a3a">Iterator pattern; one handler per scan</text>
    <text x="100" y="540" class="body" font-size="10.5" fill="#3a3a3a">URL canonicalize · dedup · page-type bucket</text>
    <text x="100" y="555" class="body" font-size="10.5" fill="#3a3a3a">Multi-modal: HTML / OCR / transcript</text>
    <text x="100" y="572" class="body" font-size="10" fill="#5a5a5a" font-style="italic">WEBSITE_CRAWLER · COA_DOC · S3_LIST · …</text>

    <!-- Policy Execution Engine -->
    <rect x="370" y="481" width="240" height="106" rx="8" fill="#ffffff" stroke="#3d6b9c" stroke-width="2"/>
    <text x="390" y="506" class="subheading" font-size="14">4 · Policy Execution Engine</text>
    <text x="390" y="525" class="body" font-size="10.5" fill="#3a3a3a">8-step loop per (item, policy)</text>
    <text x="390" y="540" class="body" font-size="10.5" fill="#3a3a3a">Dispatch via PRE / MAIN / POST hooks</text>
    <text x="390" y="555" class="body" font-size="10.5" fill="#3a3a3a">Unified AI prompt + token batching</text>
    <text x="390" y="572" class="body" font-size="10" fill="#5a5a5a" font-style="italic">EVERY_ITEM · ONCE_PER_GROUP · …</text>

    <!-- Rule Engine -->
    <rect x="660" y="481" width="240" height="106" rx="8" fill="#ffffff" stroke="#3d6b9c" stroke-width="2"/>
    <text x="680" y="506" class="subheading" font-size="14">6 · Rule Engine</text>
    <text x="680" y="525" class="body" font-size="10.5" fill="#3a3a3a">json-rules-engine · composite AND/OR/NOT</text>
    <text x="680" y="540" class="body" font-size="10.5" fill="#3a3a3a">Custom operators: fuzzy, page_section,</text>
    <text x="680" y="555" class="body" font-size="10.5" fill="#3a3a3a">confidence_aggregation, regex_any</text>
    <text x="680" y="572" class="body" font-size="10" fill="#5a5a5a" font-style="italic">PASS / FAIL / N_A / ERROR</text>

    <!-- Action Tree Executor -->
    <rect x="950" y="481" width="240" height="106" rx="8" fill="#ffffff" stroke="#3d6b9c" stroke-width="2"/>
    <text x="970" y="506" class="subheading" font-size="14">5 · Action Execution Module</text>
    <text x="970" y="525" class="body" font-size="10.5" fill="#3a3a3a">Sync + queue · idempotency cache</text>
    <text x="970" y="540" class="body" font-size="10.5" fill="#3a3a3a">Exponential backoff · circuit breaker</text>
    <text x="970" y="555" class="body" font-size="10.5" fill="#3a3a3a">Conditional branch · DLQ · iterative</text>
    <text x="970" y="572" class="body" font-size="10" fill="#5a5a5a" font-style="italic">CREATE_TICKET · SEND_EMAIL · ASK_AI · …</text>
  </g>

  <!-- arrows down to data layer -->
  <line x1="200" y1="587" x2="200" y2="617" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="587" x2="640" y2="617" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1070" y1="587" x2="1070" y2="617" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== LAYER 5 — DATA / CONTEXT ========== -->
  <text x="40" y="613" class="layer-label" font-size="11">Data flow · shared between modules</text>
  <g>
    <rect x="80" y="623" width="1120" height="64" rx="8" fill="#788c5d" stroke="#788c5d" stroke-width="1"/>
    <text x="640" y="649" class="heading light" font-size="16" text-anchor="middle">7 · Context &amp; Data Flow Module</text>
    <text x="640" y="670" class="body light" font-size="11.5" text-anchor="middle" opacity="0.92">Typed shared store · 4 scopes (item / group / scan / merchant) · provenance per entry · inline-vs-blob threshold · schema validation at boundaries</text>
  </g>

  <!-- arrows down to support modules -->
  <line x1="280" y1="687" x2="280" y2="717" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="687" x2="660" y2="717" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1020" y1="687" x2="1020" y2="717" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== LAYER 6 — INPUT / CREDENTIAL / FINGERPRINT ========== -->
  <text x="40" y="713" class="layer-label" font-size="11">Support · resolution &amp; safety</text>
  <g>
    <rect x="80" y="722" width="346" height="80" rx="8" fill="#ffffff" stroke="#788c5d" stroke-width="2"/>
    <text x="100" y="746" class="subheading" font-size="14">8 · Input Resolution</text>
    <text x="100" y="765" class="body" font-size="10.5" fill="#3a3a3a">Resolves inline / S3 / DB-KV / context refs</text>
    <text x="100" y="781" class="body" font-size="10.5" fill="#3a3a3a">Validates against typed input schemas</text>
    <text x="100" y="794" class="body" font-size="10" fill="#5a5a5a" font-style="italic">Used by policies and actions alike</text>

    <rect x="466" y="722" width="346" height="80" rx="8" fill="#ffffff" stroke="#788c5d" stroke-width="2"/>
    <text x="486" y="746" class="subheading" font-size="14">11 · Credential &amp; Security</text>
    <text x="486" y="765" class="body" font-size="10.5" fill="#3a3a3a">AWS Secrets Manager · per-tenant namespacing</text>
    <text x="486" y="781" class="body" font-size="10.5" fill="#3a3a3a">JIT credential injection at action time</text>
    <text x="486" y="794" class="body" font-size="10" fill="#5a5a5a" font-style="italic">No plaintext credentials in DB or logs</text>

    <rect x="852" y="722" width="346" height="80" rx="8" fill="#ffffff" stroke="#788c5d" stroke-width="2"/>
    <text x="872" y="746" class="subheading" font-size="14">14 · Content Fingerprint Service</text>
    <text x="872" y="765" class="body" font-size="10.5" fill="#3a3a3a">SHA-256 normalization · skip-on-unchanged</text>
    <text x="872" y="781" class="body" font-size="10.5" fill="#3a3a3a">Cache invalidation when policy version changes</text>
    <text x="872" y="794" class="body" font-size="10" fill="#5a5a5a" font-style="italic">3 force-scan paths (run / policy / admin)</text>
  </g>

  <!-- ========== LAYER 7 — CROSS-CUTTING ========== -->
  <text x="40" y="826" class="layer-label" font-size="11">Cross-cutting · every module reports to these</text>
  <g>
    <rect x="80" y="836" width="370" height="36" rx="6" fill="#a89070" stroke="#a89070" stroke-width="1"/>
    <text x="265" y="861" class="subheading light" font-size="13" text-anchor="middle">10 · Audit &amp; Observability</text>
    <text x="265" y="880" class="body" font-size="10" fill="#5a5a5a" text-anchor="middle">hash-chained log · OTel tracing · Pino logs</text>

    <rect x="465" y="836" width="370" height="36" rx="6" fill="#a89070" stroke="#a89070" stroke-width="1"/>
    <text x="650" y="861" class="subheading light" font-size="13" text-anchor="middle">12 · Notification Router</text>
    <text x="650" y="880" class="body" font-size="10" fill="#5a5a5a" text-anchor="middle">severity-routed: digest · Slack · PagerDuty</text>

    <rect x="850" y="836" width="350" height="36" rx="6" fill="#a89070" stroke="#a89070" stroke-width="1"/>
    <text x="1025" y="861" class="subheading light" font-size="13" text-anchor="middle">13 · Reporting &amp; Analytics</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 800)">
    <text x="0" y="-2" class="layer-label" font-size="9.5" fill="#5a5a5a">Layer key</text>
    <rect x="0" y="6" width="14" height="14" fill="#1f3a5f" rx="2"/><text x="20" y="17" class="body" font-size="10">Edge / Config</text>
    <rect x="120" y="6" width="14" height="14" fill="#2c5282" rx="2"/><text x="140" y="17" class="body" font-size="10">Orchestration</text>
    <rect x="245" y="6" width="14" height="14" fill="#3d6b9c" rx="2"/><text x="265" y="17" class="body" font-size="10">Execution</text>
    <rect x="345" y="6" width="14" height="14" fill="#788c5d" rx="2"/><text x="365" y="17" class="body" font-size="10">Data &amp; support</text>
    <rect x="470" y="6" width="14" height="14" fill="#a89070" rx="2"/><text x="490" y="17" class="body" font-size="10">Cross-cutting</text>
  </g>
</svg>
