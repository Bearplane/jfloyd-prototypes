<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760" role="img" aria-label="Policy version state machine: draft → testable → active → deprecated, with promotion gates, rollback, and canary">
  <title>Q-ScanAI — Policy Version Lifecycle</title>
  <desc>States: draft, testable, active, deprecated. Four promotion gates between testable and active. Side paths for canary and rollback.</desc>

  <defs>
    <style>
      .heading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; fill: #141413; }
      .subheading { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 500; fill: #141413; }
      .body { font-family: "Inter", "Lora", "Georgia", sans-serif; fill: #141413; }
      .light { fill: #faf9f5; }
      .mute { fill: #5a5a5a; font-family: "Inter", sans-serif; }
      .layer-label { font-family: "Poppins", "Inter", "Arial", sans-serif; font-weight: 600; letter-spacing: 0.06em; fill: #b0aea5; text-transform: uppercase; }
    </style>
    <marker id="arr2" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arr-warn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#d97757"/>
    </marker>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf9f5"/>
      <stop offset="1" stop-color="#f3f1e8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="40" y="50" class="heading" font-size="28">Policy Version Lifecycle</text>
  <text x="40" y="76" class="body" font-size="14" fill="#5a5a5a">Versioned configuration, immutable from creation. Every promotion clears four gates. Rollback re-activates a prior version; canary releases to a merchant subset first.</text>
  <text x="1240" y="50" class="body" font-size="12" fill="#5a5a5a" text-anchor="end">Source: 05-lifecycle-and-state-transitions.md §2 + §3</text>

  <!-- The four states (horizontal main row) -->
  <!-- DRAFT -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="200" height="120" rx="14" fill="#e8e6dc" stroke="#1f3a5f" stroke-width="2.5"/>
    <text x="100" y="40" class="heading" font-size="20" text-anchor="middle">draft</text>
    <text x="100" y="64" class="mute" font-size="10.5" text-anchor="middle">author + reviewers only</text>
    <text x="100" y="82" class="body" font-size="10.5" text-anchor="middle" fill="#3a3a3a">not used by any scan</text>
    <text x="100" y="100" class="body" font-size="10.5" text-anchor="middle" fill="#3a3a3a">new revision = new row</text>
    <line x1="20" y1="115" x2="180" y2="115" stroke="#5a5a5a" opacity="0.3"/>
  </g>

  <!-- TESTABLE -->
  <g transform="translate(370,180)">
    <rect x="0" y="0" width="200" height="120" rx="14" fill="#e8e6dc" stroke="#2c5282" stroke-width="2.5"/>
    <text x="100" y="40" class="heading" font-size="20" text-anchor="middle">testable</text>
    <text x="100" y="64" class="mute" font-size="10.5" text-anchor="middle">visible in test mode only</text>
    <text x="100" y="82" class="body" font-size="10.5" text-anchor="middle" fill="#3a3a3a">test scans only</text>
    <text x="100" y="100" class="body" font-size="10.5" text-anchor="middle" fill="#3a3a3a">writes to qsa_test_* tables</text>
  </g>

  <!-- ACTIVE -->
  <g transform="translate(660,180)">
    <rect x="0" y="0" width="200" height="120" rx="14" fill="#788c5d" stroke="#788c5d" stroke-width="2.5"/>
    <text x="100" y="40" class="heading light" font-size="20" text-anchor="middle">active</text>
    <text x="100" y="64" class="body light" font-size="10.5" text-anchor="middle" opacity="0.85">production-visible</text>
    <text x="100" y="82" class="body light" font-size="10.5" text-anchor="middle" opacity="0.85">scan runs pin this version</text>
    <text x="100" y="100" class="body light" font-size="10.5" text-anchor="middle" opacity="0.85">snapshotted at intake</text>
  </g>

  <!-- DEPRECATED -->
  <g transform="translate(950,180)">
    <rect x="0" y="0" width="200" height="120" rx="14" fill="#b0aea5" stroke="#b0aea5" stroke-width="2.5"/>
    <text x="100" y="40" class="heading" font-size="20" text-anchor="middle">deprecated</text>
    <text x="100" y="64" class="mute" font-size="10.5" text-anchor="middle">read-only history</text>
    <text x="100" y="82" class="body" font-size="10.5" text-anchor="middle" fill="#3a3a3a">replaced by newer active</text>
    <text x="100" y="100" class="body" font-size="10.5" text-anchor="middle" fill="#3a3a3a">retained ≥ 36 mo</text>
  </g>

  <!-- Main forward arrows -->
  <g stroke="#5a5a5a" stroke-width="2" fill="none">
    <line x1="280" y1="240" x2="370" y2="240" marker-end="url(#arr2)"/>
    <line x1="570" y1="240" x2="660" y2="240" marker-end="url(#arr2)"/>
    <line x1="860" y1="240" x2="950" y2="240" marker-end="url(#arr2)"/>
  </g>

  <!-- transition labels -->
  <text x="325" y="232" class="mute" font-size="11" text-anchor="middle">submit</text>
  <text x="325" y="262" class="mute" font-size="9.5" text-anchor="middle" font-style="italic">author</text>
  <text x="615" y="232" class="mute" font-size="11" text-anchor="middle">activate ✓ 4 gates</text>
  <text x="615" y="262" class="mute" font-size="9.5" text-anchor="middle" font-style="italic">approver ≠ author</text>
  <text x="905" y="232" class="mute" font-size="11" text-anchor="middle">supersede</text>
  <text x="905" y="262" class="mute" font-size="9.5" text-anchor="middle" font-style="italic">auto, on next activation</text>

  <!-- self-loop on draft (new revision) -->
  <path d="M 100 175 Q 50 130 80 220" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#arr2)"/>
  <text x="50" y="160" class="mute" font-size="10" text-anchor="end">new version</text>

  <!-- Backward arrows: testable → draft (return-to-draft) -->
  <path d="M 470 305 Q 470 340 400 340 Q 200 340 200 310" stroke="#5a5a5a" stroke-width="1.4" stroke-dasharray="5,4" fill="none" marker-end="url(#arr2)"/>
  <text x="335" y="358" class="mute" font-size="10" text-anchor="middle">return-to-draft (rare; resets test count)</text>

  <!-- Rollback (active → deprecated, deprecated → active) -->
  <path d="M 760 305 Q 760 412 1050 412 Q 1100 412 1080 310" stroke="#d97757" stroke-width="1.6" fill="none" marker-end="url(#arr-warn)"/>
  <text x="900" y="430" class="body" font-size="10.5" text-anchor="middle" fill="#d97757">rollback: re-activate prior version (impact preview + previewHash)</text>

  <!-- Promotion gates panel -->
  <g transform="translate(60,470)">
    <text x="0" y="-12" class="layer-label" font-size="11">The four promotion gates · testable → active</text>
    <rect x="0" y="0" width="600" height="252" rx="10" fill="#ffffff" stroke="#2c5282" stroke-width="1.5"/>

    <g transform="translate(20,20)">
      <circle cx="14" cy="14" r="14" fill="#1f3a5f"/>
      <text x="14" y="19" class="heading light" font-size="13" text-anchor="middle">1</text>
      <text x="40" y="14" class="subheading" font-size="13">check_type contract validation</text>
      <text x="40" y="32" class="body" font-size="11" fill="#3a3a3a">output_schema must declare every required key</text>
      <text x="40" y="46" class="body" font-size="11" fill="#3a3a3a">the active qsa_check_type_contract demands</text>
    </g>
    <g transform="translate(20,80)">
      <circle cx="14" cy="14" r="14" fill="#1f3a5f"/>
      <text x="14" y="19" class="heading light" font-size="13" text-anchor="middle">2</text>
      <text x="40" y="14" class="subheading" font-size="13">at least one successful test scan</text>
      <text x="40" y="32" class="body" font-size="11" fill="#3a3a3a">qsa_policy_version.successful_test_count ≥ 1</text>
      <text x="40" y="46" class="body" font-size="11" fill="#3a3a3a">incremented per test_scan_run = COMPLETED</text>
    </g>
    <g transform="translate(20,140)">
      <circle cx="14" cy="14" r="14" fill="#1f3a5f"/>
      <text x="14" y="19" class="heading light" font-size="13" text-anchor="middle">3</text>
      <text x="40" y="14" class="subheading" font-size="13">four-eyes — approver ≠ author</text>
      <text x="40" y="32" class="body" font-size="11" fill="#3a3a3a">enforced at API + DB CHECK constraint</text>
      <text x="40" y="46" class="body" font-size="11" fill="#3a3a3a">defense in depth across both layers</text>
    </g>
    <g transform="translate(20,200)">
      <circle cx="14" cy="14" r="14" fill="#1f3a5f"/>
      <text x="14" y="19" class="heading light" font-size="13" text-anchor="middle">4</text>
      <text x="40" y="14" class="subheading" font-size="13">no dependency cycle</text>
      <text x="40" y="32" class="body" font-size="11" fill="#3a3a3a">qsa_policy_dependency graph must be acyclic</text>
      <text x="40" y="46" class="body" font-size="11" fill="#3a3a3a">re-checked at every scan-run intake too</text>
    </g>

    <!-- Side note -->
    <g transform="translate(360,90)">
      <rect x="0" y="0" width="220" height="120" rx="8" fill="#faf9f5" stroke="#b0aea5"/>
      <text x="14" y="22" class="subheading" font-size="12">+ extra promotion gates</text>
      <text x="14" y="42" class="body" font-size="10.5" fill="#3a3a3a">Item-type compatibility (ADR-028)</text>
      <text x="14" y="58" class="body" font-size="10.5" fill="#3a3a3a">Execution-pattern coherence (ADR-030)</text>
      <text x="14" y="74" class="body" font-size="10.5" fill="#3a3a3a">policy_kind / mutating action gate</text>
      <text x="14" y="88" class="body" font-size="10.5" fill="#3a3a3a">FOLDER input requires aggregate pattern</text>
      <text x="14" y="106" class="mute" font-size="9.5">All emit config.promotion_rejected on fail.</text>
    </g>
  </g>

  <!-- Canary side path -->
  <g transform="translate(700,470)">
    <text x="0" y="-12" class="layer-label" font-size="11">Canary activation · optional side path</text>
    <rect x="0" y="0" width="540" height="252" rx="10" fill="#ffffff" stroke="#3d6b9c" stroke-width="1.5"/>

    <g>
      <rect x="20" y="40" width="120" height="58" rx="10" fill="#e8e6dc" stroke="#2c5282" stroke-width="2"/>
      <text x="80" y="64" class="subheading" font-size="13" text-anchor="middle">testable</text>
      <text x="80" y="82" class="mute" font-size="10" text-anchor="middle">approved + tested</text>

      <rect x="200" y="40" width="120" height="58" rx="10" fill="#d97757" stroke="#d97757"/>
      <text x="260" y="64" class="subheading light" font-size="13" text-anchor="middle">canary</text>
      <text x="260" y="82" class="body light" font-size="10" text-anchor="middle" opacity="0.9">subset of merchants</text>

      <rect x="380" y="40" width="120" height="58" rx="10" fill="#788c5d" stroke="#788c5d"/>
      <text x="440" y="64" class="subheading light" font-size="13" text-anchor="middle">active</text>
      <text x="440" y="82" class="body light" font-size="10" text-anchor="middle" opacity="0.9">all merchants</text>

      <line x1="140" y1="69" x2="200" y2="69" stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#arr2)"/>
      <line x1="320" y1="69" x2="380" y2="69" stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#arr2)"/>
      <text x="170" y="56" class="mute" font-size="10" text-anchor="middle">canary-activate</text>
      <text x="350" y="56" class="mute" font-size="10" text-anchor="middle">canary-promote</text>
    </g>

    <!-- canary-abort returns to testable -->
    <path d="M 260 100 Q 260 150 200 150 Q 80 150 80 100" stroke="#5a5a5a" stroke-width="1.4" stroke-dasharray="5,4" fill="none" marker-end="url(#arr2)"/>
    <text x="170" y="170" class="mute" font-size="10" text-anchor="middle">canary-abort</text>

    <!-- explanatory text -->
    <text x="20" y="200" class="body" font-size="11" fill="#3a3a3a">Canary-pinned scans for the chosen cohort run against</text>
    <text x="20" y="216" class="body" font-size="11" fill="#3a3a3a">the new version while everyone else stays on the prior</text>
    <text x="20" y="232" class="body" font-size="11" fill="#3a3a3a">active. Results land in qsa_test_* tables — no production</text>
    <text x="20" y="248" class="body" font-size="11" fill="#3a3a3a">finding memory mutation until canary-promote.</text>
  </g>

  <!-- Footer immutability box -->
  <g transform="translate(60,732)">
    <rect x="0" y="-22" width="1180" height="22" rx="4" fill="#1f3a5f"/>
    <text x="14" y="-7" class="body light" font-size="11" font-style="italic">Every *_version row is immutable from creation. Payload + descriptive columns are read-only forever; only state-tracking columns flip. Triggers + API guards enforce both layers.</text>
  </g>
</svg>
