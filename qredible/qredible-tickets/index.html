<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qredible — Sprint Mockups</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #3B82F6;
      --blue-dark: #2563EB;
      --green: #16A34A;
      --green-light: #22C55E;
      --red: #DC2626;
      --red-light: #EF4444;
      --orange: #D97706;
      --orange-light: #F59E0B;
      --purple: #7C3AED;
      --purple-light: #8B5CF6;
      --teal: #0D9488;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text-primary: #0F172A;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --header-bg: #1E3A5F;
      --radius-card: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .page-header {
      background: var(--header-bg);
      color: white;
      padding: 20px 36px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .page-header h1 { font-size: 18px; font-weight: 700; }
    .page-header .sub { font-size: 12px; color: #90CAF9; margin-top: 2px; }
    .nav {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 36px;
      display: flex;
      gap: 4px;
    }
    .nav a {
      display: block;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 2px solid transparent;
    }
    .nav a.active { color: var(--blue); border-bottom-color: var(--blue); }
    .nav a:hover { color: var(--text-primary); }
    .content { padding: 32px 36px; max-width: 1400px; }
    h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .ticket-meta {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-blue { background: #EFF6FF; color: #1D4ED8; }
    .badge-green { background: #F0FDF4; color: #15803D; }
    .badge-orange { background: #FFFBEB; color: #B45309; }
    .badge-red { background: #FEF2F2; color: #B91C1C; }
    .badge-purple { background: #F5F3FF; color: #6D28D9; }
    .badge-gray { background: #F1F5F9; color: #475569; }
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .mockup-frame {
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: white;
      margin-bottom: 32px;
    }
    .mockup-title {
      background: #F8FAFC;
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  </style>
</head>
<body>
<div class="page-header">
  <div>
    <h1>Qredible Sprint Mockups</h1>
    <div class="sub">Audit Improvement Initiative · Product Classification Framework — March 2026</div>
  </div>
</div>
<div class="nav">
  <a href="coa-inactive.html" class="active">COA Inactive State</a>
  <a href="coa-issue-category.html">COA Issue Category</a>
  <a href="bulk-unassign.html">Bulk Unassign COAs</a>
  <a href="tobacco-classification.html">Tobacco/Vape Classifications</a>
  <a href="fda-ends.html">FDA ENDS Check</a>
  <a href="product-family.html">Product Family L2</a>
</div>
<div class="content">
  <p style="color: var(--text-secondary); font-size:14px;">Select a ticket above to view its mockup and full specification.</p>
</div>
</body>
</html>
